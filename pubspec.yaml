name: diagonal_wipe_icon
description: A Flutter widget for SF Symbols-style icon transitions with diagonal, horizontal, or vertical wipe masks.
version: 0.1.0
homepage: https://github.com/bernaferrari/diagonal-wipe-icon
repository: https://github.com/bernaferrari/diagonal-wipe-icon
issue_tracker: https://github.com/bernaferrari/diagonal-wipe-icon/issues
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:
screenshots:
  - description: Preview of the diagonal wipe icon transition between two Material icons.
    path: assets/preview.png
  - description: Visual explanation of how the wipe mask reveals the destination icon over the source icon.
    path: assets/how-it-works.png
topics:
  - animation
  - icons
  - material-design
  - transitions

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
