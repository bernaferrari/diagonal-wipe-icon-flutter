name: diagonal_wipe_icon
description: Polished wipe-style icon transitions for Flutter with diagonal, horizontal, and vertical directions.
version: 0.1.0
homepage: https://github.com/bernaferrari/diagonal-wipe-icon-flutter
repository: https://github.com/bernaferrari/diagonal-wipe-icon-flutter
issue_tracker: https://github.com/bernaferrari/diagonal-wipe-icon-flutter/issues
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:
screenshots:
  - description: Preview of the diagonal wipe icon transition between two Material icons.
    path: assets/preview.png
  - description: Visual explanation of how the wipe mask reveals the destination icon over the source icon.
    path: assets/how-it-works.png
topics:
  - animation
  - icons
  - flutter
  - transitions

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
