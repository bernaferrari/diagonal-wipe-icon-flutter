name: diagonal_wipe_icon_flutter
description: Flutter port of the Diagonal Wipe Icon Compose project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  material_symbols_icons: ^4.2906.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: MaterialSymbolsOutlined
      fonts:
        - asset: packages/material_symbols_icons/fonts/MaterialSymbolsOutlined.ttf
    - family: MaterialSymbolsRounded
      fonts:
        - asset: packages/material_symbols_icons/fonts/MaterialSymbolsRounded.ttf
    - family: MaterialSymbolsSharp
      fonts:
        - asset: packages/material_symbols_icons/fonts/MaterialSymbolsSharp.ttf
